<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TRPG 웹 - 캐릭터 생성</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body data-page="character">
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="./index.html" aria-label="메인으로">
          <span class="brand-badge">D</span>
          <span>TRPG 웹</span>
        </a>
        <nav class="nav" data-nav>
          <a href="./index.html" data-page="home">메인</a>
          <a href="./character.html" data-page="character">캐릭터 생성</a>
          <a href="./game.html" data-page="game">게임</a>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <div class="card pad">
          <div style="display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap">
            <div>
              <div class="pill">캐릭터 생성</div>
              <p class="subtitle" style="margin: 10px 0 0">
                작성 후 <b>로컬 저장</b>하거나 <b>xlsx로 내보내기/가져오기</b>로 시트를 이동할 수 있어요. (xlsx는 인터넷이 필요할 수 있어요.)
              </p>
            </div>
            <div class="btn-row" style="margin-top: 0">
              <button class="btn ok" id="btnSave">로컬 저장</button>
              <button class="btn" id="btnLoad">로컬 불러오기</button>
              <button class="btn primary" id="btnExport">xlsx 내보내기</button>
              <label class="btn" style="cursor: pointer">
                xlsx 가져오기
                <input id="fileImport" type="file" accept=".xlsx" style="display: none" />
              </label>
              <button class="btn danger" id="btnReset">초기화</button>
            </div>
          </div>
        </div>

        <div style="height: 14px"></div>

        <div class="split">
          <div class="card pad">
            <div class="pill">기본 정보</div>
            <div style="height: 10px"></div>

            <label>캐릭터 이름</label>
            <input class="field" id="characterName" placeholder="예: 레나" />

            <div style="height: 10px"></div>
            <div class="row">
              <div>
                <label>플레이어</label>
                <input class="field" id="playerName" placeholder="예: 홍길동" />
              </div>
              <div>
                <label>캠페인</label>
                <input class="field" id="campaign" placeholder="예: 검은 달의 연대기" />
              </div>
            </div>

            <div style="height: 10px"></div>
            <label>컨셉(한 줄)</label>
            <input class="field" id="concept" placeholder="예: 빚을 갚기 위해 모험하는 도적" />

            <div style="height: 10px"></div>
            <div class="row">
              <div>
                <label>아키타입/직업</label>
                <input class="field" id="archetype" placeholder="예: 정찰자" />
              </div>
              <div>
                <label>레벨</label>
                <input class="field" id="level" type="number" min="1" step="1" />
              </div>
            </div>

            <div style="height: 10px"></div>
            <div class="row">
              <div>
                <label>나이</label>
                <input class="field" id="age" placeholder="예: 23" />
              </div>
              <div>
                <label>대명사</label>
                <input class="field" id="pronouns" placeholder="예: 그는/그" />
              </div>
            </div>

            <div style="height: 10px"></div>
            <label>초상 URL(선택)</label>
            <input class="field" id="portraitUrl" placeholder="https://..." />

            <div class="hr"></div>
            <div class="pill">생존/자원</div>
            <div style="height: 10px"></div>

            <div class="row">
              <div>
                <label>체력(현재)</label>
                <input class="field" id="hpCurrent" type="number" min="0" step="1" />
              </div>
              <div>
                <label>체력(최대)</label>
                <input class="field" id="hpMax" type="number" min="1" step="1" />
              </div>
            </div>
            <div style="height: 10px"></div>
            <div class="row">
              <div>
                <label>정신력(현재)</label>
                <input class="field" id="mpCurrent" type="number" min="0" step="1" />
              </div>
              <div>
                <label>정신력(최대)</label>
                <input class="field" id="mpMax" type="number" min="1" step="1" />
              </div>
            </div>
            <div style="height: 10px"></div>
            <label>스트레스(선택)</label>
            <input class="field" id="stress" type="number" min="0" step="1" />
          </div>

          <div>
            <div class="card pad">
              <div class="pill">스탯</div>
              <p class="subtitle" style="margin: 10px 0 0">
                힘/민첩/체질/지능/지혜/행운 기반으로 파생치(공격/방어/선제/이동/소지)를 자동 계산합니다.
              </p>
              <div class="hr"></div>

              <div class="grid3">
                <div>
                  <label>힘 (STR)</label>
                  <input class="field" id="str" type="number" step="1" />
                </div>
                <div>
                  <label>민첩 (DEX)</label>
                  <input class="field" id="dex" type="number" step="1" />
                </div>
                <div>
                  <label>체질 (CON)</label>
                  <input class="field" id="con" type="number" step="1" />
                </div>
                <div>
                  <label>지능 (INT)</label>
                  <input class="field" id="int" type="number" step="1" />
                </div>
                <div>
                  <label>지혜 (WIS)</label>
                  <input class="field" id="wis" type="number" step="1" />
                </div>
                <div>
                  <label>행운 (LUCK)</label>
                  <input class="field" id="luck" type="number" step="1" />
                </div>
              </div>

              <div style="height: 12px"></div>
              <div class="grid3">
                <div class="stat"><strong>공격</strong><span class="value" id="dAttack">0</span></div>
                <div class="stat"><strong>방어</strong><span class="value" id="dDefense">0</span></div>
                <div class="stat"><strong>선제</strong><span class="value" id="dInitiative">0</span></div>
                <div class="stat"><strong>이동</strong><span class="value" id="dMove">0</span></div>
                <div class="stat"><strong>소지</strong><span class="value" id="dCarry">0</span></div>
                <div class="stat"><strong>업데이트</strong><span class="value" id="dUpdated">-</span></div>
              </div>
            </div>

            <div style="height: 14px"></div>

            <div class="card pad">
              <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap">
                <div class="pill">기술(스킬)</div>
                <button class="btn" id="btnAddSkill">스킬 추가</button>
              </div>
              <div style="height: 10px"></div>
              <table class="table" id="skillsTable" aria-label="스킬 목록">
                <thead>
                  <tr>
                    <th>이름</th>
                    <th class="tiny">수치</th>
                    <th>메모</th>
                    <th class="actions">작업</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>

            <div style="height: 14px"></div>

            <div class="card pad">
              <div style="display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap">
                <div class="pill">장비/소지품</div>
                <button class="btn" id="btnAddItem">아이템 추가</button>
              </div>
              <div style="height: 10px"></div>
              <table class="table" id="itemsTable" aria-label="아이템 목록">
                <thead>
                  <tr>
                    <th>이름</th>
                    <th class="tiny">수량</th>
                    <th>메모</th>
                    <th class="actions">작업</th>
                  </tr>
                </thead>
                <tbody></tbody>
              </table>
            </div>

            <div style="height: 14px"></div>

            <div class="card pad">
              <div class="pill">서사/메모</div>
              <div style="height: 10px"></div>
              <div class="grid2">
                <div>
                  <label>특성(성격/강점)</label>
                  <textarea class="field" id="traits" rows="3" placeholder="예: 침착, 잔인한 유머감각"></textarea>
                </div>
                <div>
                  <label>유대(관계/서약)</label>
                  <textarea class="field" id="bonds" rows="3" placeholder="예: 고아원 원장에게 빚"></textarea>
                </div>
                <div>
                  <label>결함(약점/금기)</label>
                  <textarea class="field" id="flaws" rows="3" placeholder="예: 불을 무서워함"></textarea>
                </div>
                <div>
                  <label>배경(요약)</label>
                  <textarea class="field" id="backstory" rows="3" placeholder="예: 귀족가의 몰락..."></textarea>
                </div>
              </div>
              <div style="height: 10px"></div>
              <label>GM 메모(선택)</label>
              <textarea class="field" id="gmNotes" rows="3" placeholder="이 칸은 마스터가 비공개로 쓰는 용도(로컬 기준)"></textarea>
            </div>
          </div>
        </div>
      </div>
    </main>

    <div class="footer container">팁: 게임 페이지에서 이 시트를 바로 불러와 연동할 수 있어요.</div>

    <script src="./js/common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="./js/character.js"></script>
  </body>
</html>
